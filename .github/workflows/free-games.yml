name: Epic Games Free Games Tracker

on:
  schedule:
    # Run daily at 17:00 UTC to ensure no free game is missed
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  check-free-games:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new free games
        id: check
        run: python scripts/check_free_games.py

      - name: Commit updated data
        if: steps.check.outputs.has_new_games == 'true'
        run: |
          git config user.name "renshuki"
          git config user.email "renshuki@users.noreply.github.com"
          git add data/free_games.json
          git commit -m "Update free games data — $(date -u +%Y-%m-%d)"
          git push

      - name: Ensure free-games label exists
        if: steps.check.outputs.has_new_games == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create "free-games" --color "0E8A16" --description "Epic Games Store free games" || true

      - name: Create GitHub Issue
        if: steps.check.outputs.has_new_games == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.check.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.check.outputs.issue_body }}
        id: create_issue
        run: |
          ISSUE_URL=$(gh issue create \
            --title "🎮 $ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "free-games")
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Lock issue
        if: steps.check.outputs.has_new_games == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue lock "${{ steps.create_issue.outputs.issue_url }}"
